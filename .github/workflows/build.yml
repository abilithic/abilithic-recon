name: Build Windows EXE

on:
  push:
    tags:
      - "v*"          # build & release on version tags, e.g. v1.0.0
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q
        continue-on-error: true

      - name: Build EXE
        run: pyinstaller abilithic-recon.spec --noconfirm

      - name: Generate SHA-256 checksum
        run: |
          certutil -hashfile dist\AbilithicRecon.exe SHA256 > dist\AbilithicRecon.exe.sha256.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbilithicRecon-windows
          path: |
            dist/AbilithicRecon.exe
            dist/AbilithicRecon.exe.sha256.txt

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AbilithicRecon.exe
            dist/AbilithicRecon.exe.sha256.txt
